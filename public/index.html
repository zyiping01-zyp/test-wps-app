<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>座位预约系统</title>
<style>
  :root {
    --primary: #2b7de9;
    --primary-hover: #1a6cd8;
    --success: #52c41a;
    --warning: #faad14;
    --danger: #ff4d4f;
    --bg: #f0f2f5;
    --card-bg: #ffffff;
    --text: #1f1f1f;
    --text-secondary: #666;
    --border: #e8e8e8;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #2b7de9 0%, #1a5fc7 100%);
    color: white;
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 8px rgba(43,125,233,0.3);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header h1 .icon { font-size: 24px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .user-info {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
  }
  .user-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
  }
  .btn {
    padding: 8px 20px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary {
    background: white;
    color: var(--primary);
  }
  .btn-primary:hover { background: #f0f5ff; }
  .btn-outline {
    background: transparent;
    color: white;
    border: 1px solid rgba(255,255,255,0.5);
  }
  .btn-outline:hover { border-color: white; background: rgba(255,255,255,0.1); }
  .btn-success {
    background: var(--success);
    color: white;
  }
  .btn-success:hover { background: #45b815; }
  .btn-success:disabled { background: #b7eb8f; cursor: not-allowed; }
  .btn-danger {
    background: var(--danger);
    color: white;
  }
  .btn-danger:hover { background: #e04347; }

  /* Main */
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 16px;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 16px 24px;
    box-shadow: var(--shadow);
    flex: 1;
    min-width: 120px;
    text-align: center;
  }
  .stat-card .num {
    font-size: 28px;
    font-weight: 700;
    line-height: 1.2;
  }
  .stat-card .label {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 4px;
  }
  .stat-card.free .num { color: var(--success); }
  .stat-card.pending .num { color: var(--warning); }
  .stat-card.confirmed .num { color: var(--danger); }
  .stat-card.mine .num { color: var(--primary); }

  /* Legend */
  .legend {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    background: var(--card-bg);
    padding: 12px 20px;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .legend-color {
    width: 20px; height: 20px;
    border-radius: 6px;
    border: 2px solid transparent;
  }
  .legend-color.free { background: #e8f5e9; border-color: #a5d6a7; }
  .legend-color.pending { background: #fff8e1; border-color: #ffe082; }
  .legend-color.confirmed { background: #ffebee; border-color: #ef9a9a; }
  .legend-color.mine { background: #e3f2fd; border-color: #90caf9; }

  /* Seat grid */
  .seat-grid-wrapper {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
    overflow-x: auto;
  }
  .seat-grid {
    display: grid;
    gap: 10px;
    justify-content: center;
    margin: 0 auto;
  }
  .seat {
    width: 72px;
    height: 72px;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 13px;
    font-weight: 600;
    border: 2px solid transparent;
    position: relative;
    user-select: none;
  }
  .seat .seat-icon { font-size: 20px; margin-bottom: 2px; }
  .seat .seat-label { font-size: 11px; }
  .seat.free {
    background: #e8f5e9;
    border-color: #a5d6a7;
    color: #2e7d32;
  }
  .seat.free:hover {
    background: #c8e6c9;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(76,175,80,0.3);
  }
  .seat.pending {
    background: #fff8e1;
    border-color: #ffe082;
    color: #f57f17;
    cursor: default;
  }
  .seat.confirmed {
    background: #ffebee;
    border-color: #ef9a9a;
    color: #c62828;
    cursor: default;
  }
  .seat.mine-pending {
    background: #e3f2fd;
    border-color: #90caf9;
    color: #1565c0;
    animation: pulse-blue 1.5s ease-in-out infinite;
  }
  .seat.mine-confirmed {
    background: #bbdefb;
    border-color: #64b5f6;
    color: #0d47a1;
  }
  .seat .mine-badge {
    position: absolute;
    top: -6px;
    right: -6px;
    background: var(--primary);
    color: white;
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 8px;
    font-weight: 600;
  }
  .seat .user-label {
    font-size: 9px;
    font-weight: 400;
    max-width: 60px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-top: 1px;
  }
  @keyframes pulse-blue {
    0%, 100% { box-shadow: 0 0 0 0 rgba(43,125,233,0.4); }
    50% { box-shadow: 0 0 0 6px rgba(43,125,233,0); }
  }

  /* Row label */
  .row-label {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: var(--text-secondary);
    width: 36px;
  }

  /* Selection panel */
  .selection-panel {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 20px 24px;
    box-shadow: var(--shadow);
    margin-top: 20px;
    display: none;
  }
  .selection-panel.active { display: block; }
  .selection-panel h3 {
    font-size: 16px;
    margin-bottom: 12px;
  }
  .selection-panel .selected-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }
  .selection-panel .selected-tag {
    background: #e3f2fd;
    color: var(--primary);
    padding: 4px 12px;
    border-radius: 16px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .selection-panel .selected-tag .remove {
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    opacity: 0.6;
  }
  .selection-panel .selected-tag .remove:hover { opacity: 1; }
  .selection-panel .actions {
    display: flex;
    gap: 12px;
  }

  /* Login overlay */
  .login-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    backdrop-filter: blur(4px);
  }
  .login-card {
    background: white;
    border-radius: 16px;
    padding: 40px;
    text-align: center;
    max-width: 400px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .login-card .logo {
    font-size: 48px;
    margin-bottom: 16px;
  }
  .login-card h2 {
    font-size: 22px;
    margin-bottom: 8px;
  }
  .login-card p {
    color: var(--text-secondary);
    margin-bottom: 24px;
    font-size: 14px;
    line-height: 1.6;
  }
  .login-card .btn-wps {
    background: var(--primary);
    color: white;
    padding: 12px 40px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .login-card .btn-wps:hover { background: var(--primary-hover); transform: translateY(-1px); }

  /* Toast */
  .toast {
    position: fixed;
    top: 80px;
    right: 24px;
    background: white;
    border-radius: 10px;
    padding: 14px 20px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 2000;
    transform: translateX(120%);
    transition: transform 0.3s ease;
    max-width: 360px;
  }
  .toast.show { transform: translateX(0); }
  .toast.success { border-left: 4px solid var(--success); }
  .toast.error { border-left: 4px solid var(--danger); }
  .toast.warning { border-left: 4px solid var(--warning); }
  .toast .toast-icon { font-size: 20px; }
  .toast .toast-msg { font-size: 14px; }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px;
    flex-direction: column;
    gap: 16px;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #e8e8e8;
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Responsive */
  @media (max-width: 768px) {
    .seat { width: 56px; height: 56px; font-size: 11px; }
    .seat .seat-icon { font-size: 16px; }
    .seat .seat-label { font-size: 10px; }
    .seat-grid { gap: 6px; }
    .header h1 { font-size: 16px; }
    .stat-card { padding: 12px 16px; }
    .stat-card .num { font-size: 22px; }
  }

  /* Config panel */
  .config-panel {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 20px 24px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }
  .config-panel h3 {
    font-size: 15px;
    margin-bottom: 12px;
    color: var(--text-secondary);
  }
  .config-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .config-row input {
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    flex: 1;
    min-width: 200px;
    outline: none;
  }
  .config-row input:focus { border-color: var(--primary); }
  .config-row .hint {
    font-size: 12px;
    color: var(--text-secondary);
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1><span class="icon">🪑</span> 座位预约系统</h1>
  <div class="header-right">
    <div class="user-info" id="userInfo" style="display:none;">
      <div class="user-avatar" id="userAvatar">?</div>
      <span id="userName"></span>
    </div>
    <button class="btn btn-outline" id="loginBtn" onclick="login()">登录 WPS</button>
    <button class="btn btn-outline" id="logoutBtn" style="display:none;" onclick="logout()">退出</button>
  </div>
</div>

<div class="container">
  <!-- Config -->
  <div class="config-panel" id="configPanel">
    <h3>⚙️ 系统配置</h3>
    <div class="config-row">
      <input type="text" id="clientIdInput" placeholder="Client ID（WPS 开放平台应用ID）" />
      <input type="text" id="fileIdInput" placeholder="多维表 File ID" value="hZxs1oL261MSdn1L2qqZ1xQXMxTQfGJty" />
      <button class="btn btn-primary" onclick="saveConfig()">保存配置</button>
    </div>
    <div style="margin-top:8px;font-size:12px;color:var(--text-secondary);">
      💡 首次使用需在 <a href="https://open.wps.cn" target="_blank" style="color:var(--primary);">WPS 开放平台</a> 创建应用，配置回调地址为当前页面地址
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-card free"><div class="num" id="statFree">0</div><div class="label">空闲</div></div>
    <div class="stat-card pending"><div class="num" id="statPending">0</div><div class="label">预选中</div></div>
    <div class="stat-card confirmed"><div class="num" id="statConfirmed">0</div><div class="label">已确认</div></div>
    <div class="stat-card mine"><div class="num" id="statMine">0</div><div class="label">我的座位</div></div>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item"><div class="legend-color free"></div> 空闲</div>
    <div class="legend-item"><div class="legend-color pending"></div> 他人预选中</div>
    <div class="legend-item"><div class="legend-color confirmed"></div> 已确认</div>
    <div class="legend-item"><div class="legend-color mine"></div> 我的座位</div>
  </div>

  <!-- Seat grid -->
  <div class="seat-grid-wrapper">
    <div id="seatContainer" class="loading">
      <div class="spinner"></div>
      <div style="color:var(--text-secondary);">加载座位数据中...</div>
    </div>
  </div>

  <!-- Selection panel -->
  <div class="selection-panel" id="selectionPanel">
    <h3>📋 已选座位</h3>
    <div class="selected-list" id="selectedList"></div>
    <div class="actions">
      <button class="btn btn-success" id="confirmBtn" onclick="confirmSelection()">✅ 确认选座</button>
      <button class="btn btn-danger" id="cancelBtn" onclick="cancelSelection()">🗑️ 取消选择</button>
    </div>
  </div>
</div>

<!-- Login overlay -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <div class="logo">🪑</div>
    <h2>座位预约系统</h2>
    <p>请使用 WPS 账号登录后选择座位<br/>支持一次选择多个座位</p>
    <button class="btn-wps" onclick="login()">🔑 使用 WPS 账号登录</button>
    <div style="margin-top:16px;font-size:13px;color:var(--text-secondary);">
      首次使用？先
      <a href="#" onclick="showPreLoginConfig();return false;" style="color:var(--primary);text-decoration:underline;">配置 Client ID</a>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <span class="toast-icon" id="toastIcon">✅</span>
  <span class="toast-msg" id="toastMsg"></span>
</div>

<script>
// ============================================================
// Configuration
// ============================================================
// 后端代理地址（同源，无跨域问题）
const API_BASE = '';
// WPS OAuth 授权地址
const AUTH_BASE = 'https://openapi.wps.cn';
const SCOPE = 'kso.user_base.read,kso.dbsheet.readwrite';

// State
let state = {
  accessToken: null,
  user: null,
  seats: [],
  selectedSeats: new Set(),
  myUserId: null,
  config: { clientId: '', fileId: 'hZxs1oL261MSdn1L2qqZ1xQXMxTQfGJty', callbackUrl: '' },
  sheetId: 2,
  pollingTimer: null
};

// ============================================================
// PKCE Helpers
// ============================================================
function generateCodeVerifier() {
  const array = new Uint8Array(32);
  crypto.getRandomValues(array);
  return base64URLEncode(array);
}

function base64URLEncode(buffer) {
  return btoa(String.fromCharCode(...new Uint8Array(buffer)))
    .replace(/\+/g, '-')
    .replace(/\//g, '_')
    .replace(/=+$/, '');
}

async function generateCodeChallenge(verifier) {
  const encoder = new TextEncoder();
  const data = encoder.encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  return base64URLEncode(digest);
}

// ============================================================
// OAuth 2.0 PKCE Flow
// ============================================================
function login() {
  const clientId = state.config.clientId;
  if (!clientId) {
    showToast('请先配置 Client ID', 'warning');
    document.getElementById('configPanel').scrollIntoView({ behavior: 'smooth' });
    return;
  }

  let redirectUri = (window.location.origin + window.location.pathname).replace(/\/+$/, '');
  // Remove trailing slash to match registered callback URL
  const params = new URLSearchParams({
    client_id: clientId,
    response_type: 'code',
    redirect_uri: redirectUri,
    scope: SCOPE,
    state: 'seat_' + Date.now()
  });
  window.location.href = AUTH_BASE + '/oauth2/auth?' + params.toString();
}

async function handleCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');

  if (error) {
    showToast('登录失败: ' + error, 'error');
    return;
  }

  if (!code) return false;

  const redirectUri = (window.location.origin + window.location.pathname).replace(/\/+$/, '');

  try {
    const resp = await fetch('/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, redirect_uri: redirectUri })
    });

    const data = await resp.json();
    if (data.ok && data.access_token) {
      state.accessToken = data.access_token;
      localStorage.setItem('access_token', data.access_token);
      if (data.refresh_token) {
        localStorage.setItem('refresh_token', data.refresh_token);
      }
      sessionStorage.removeItem('pkce_verifier');
      // Clean URL
      window.history.replaceState({}, document.title, window.location.pathname);
      showToast('登录成功！', 'success');
      await initApp();
      return true;
    } else {
      showToast('获取令牌失败: ' + JSON.stringify(data), 'error');
    }
  } catch (e) {
    showToast('网络错误: ' + e.message, 'error');
  }
  return true;
}

function logout() {
  state.accessToken = null;
  state.user = null;
  localStorage.removeItem('access_token');
  localStorage.removeItem('refresh_token');
  showToast('已退出登录', 'warning');
  resetUI();
}

// ============================================================
// API Calls
// ============================================================
async function apiCall(method, path, body) {
  if (!state.accessToken) {
    showToast('请先登录', 'warning');
    return null;
  }

  try {
    const options = {
      method,
      headers: {
        'Authorization': 'Bearer ' + state.accessToken,
        'Content-Type': 'application/json'
      }
    };
    if (body) options.body = JSON.stringify(body);

    // 添加时间戳绕过浏览器/CDN缓存
    const separator = path.includes('?') ? '&' : '?';
    const url = API_BASE + path + separator + '_t=' + Date.now();
    const resp = await fetch(url, options);
    
    // 调试：如果状态码不是200，显示详细信息
    if (!resp.ok) {
      const text = await resp.text();
      showToast('请求失败 [' + resp.status + '] ' + url + ': ' + text.slice(0, 100), 'error');
      return null;
    }
    
    const data = await resp.json();

    if (!data.ok) {
      if (data.error && (data.error.includes('401') || data.error.includes('token'))) {
        // Try refresh token
        const refreshed = await refreshToken();
        if (refreshed) {
          // Retry with new token
          return await apiCall(method, path, body);
        }
        showToast('登录已过期，请重新登录', 'error');
        state.accessToken = null;
        localStorage.removeItem('access_token');
        resetUI();
        return null;
      }
      throw new Error(data.error || '请求失败');
    }
    return data.data;
  } catch (e) {
    showToast('请求失败: ' + e.message, 'error');
    return null;
  }
}

async function getCurrentUser() {
  return await apiCall('GET', '/api/user/me');
}

async function listSeats() {
  const data = await apiCall('POST', '/api/dbsheet/records', {
    file_id: state.config.fileId,
    sheet_id: state.sheetId,
    page_size: 100
  });
  return data ? data.records : [];
}

async function updateSeatRecords(records) {
  return await apiCall('POST', '/api/dbsheet/records/update', {
    file_id: state.config.fileId,
    sheet_id: state.sheetId,
    records
  });
}

async function refreshToken() {
  const rt = localStorage.getItem('refresh_token');
  if (!rt) return false;
  try {
    const resp = await fetch('/api/refresh', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh_token: rt })
    });
    const data = await resp.json();
    if (data.ok && data.access_token) {
      state.accessToken = data.access_token;
      localStorage.setItem('access_token', data.access_token);
      if (data.refresh_token) localStorage.setItem('refresh_token', data.refresh_token);
      return true;
    }
  } catch (e) {
    // ignore
  }
  return false;
}

// ============================================================
// Seat Map Rendering
// ============================================================
function renderSeats() {
  const container = document.getElementById('seatContainer');
  const seats = state.seats;

  if (!seats || seats.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-secondary);">暂无座位数据</div>';
    return;
  }

  // Group by row
  const rows = {};
  seats.forEach(s => {
    const fields = typeof s.fields === 'string' ? JSON.parse(s.fields) : s.fields;
    const row = fields['排号'];
    if (!rows[row]) rows[row] = [];
    rows[row].push({ ...s, fields });
  });

  const rowKeys = Object.keys(rows).sort((a, b) => a - b);
  const maxCols = Math.max(...Object.values(rows).map(r => r.length));

  let html = '<div class="seat-grid" style="grid-template-columns:36px repeat(' + maxCols + ', 72px);">';

  // Header
  html += '<div></div>';
  for (let c = 1; c <= maxCols; c++) {
    html += '<div style="text-align:center;font-size:12px;color:var(--text-secondary);font-weight:600;padding-bottom:4px;">' + c + '</div>';
  }

  rowKeys.forEach(rk => {
    const rowSeats = rows[rk].sort((a, b) => a.fields['列号'] - b.fields['列号']);
    const rowLabel = String.fromCharCode(64 + parseInt(rk));
    html += '<div class="row-label">' + rowLabel + '</div>';

    rowSeats.forEach(s => {
      const seatId = s.fields['座位编号'];
      const status = s.fields['状态'];
      const selectedBy = s.fields['选中人'] || '';
      const selectedById = s.fields['选中人ID'] || '';
      const isMine = selectedById && state.myUserId && selectedById === state.myUserId;
      const isSelected = state.selectedSeats.has(s.id);

      let cls = 'seat';
      let badge = '';
      let userLabel = '';

      if (isSelected) {
        cls += ' mine-pending';
        badge = '<span class="mine-badge">选</span>';
      } else if (isMine && status === '已确认') {
        cls += ' mine-confirmed';
        badge = '<span class="mine-badge">我</span>';
        userLabel = '<span class="user-label">' + (selectedBy || '我') + '</span>';
      } else if (isMine && status === '预选中') {
        cls += ' mine-pending';
        badge = '<span class="mine-badge">我</span>';
      } else if (status === '空闲') {
        cls += ' free';
      } else if (status === '预选中') {
        cls += ' pending';
        userLabel = '<span class="user-label">' + (selectedBy || '选座中') + '</span>';
      } else if (status === '已确认') {
        cls += ' confirmed';
        userLabel = '<span class="user-label">' + (selectedBy || '已占用') + '</span>';
      }

      const clickable = (status === '空闲' || isSelected) ? 'onclick="toggleSeat(\'' + s.id + '\',\'' + seatId + '\')"' : '';

      html += '<div class="' + cls + '" ' + clickable + ' title="' + seatId + ' - ' + status + '">';
      html += badge;
      html += '<span class="seat-icon">🪑</span>';
      html += '<span class="seat-label">' + seatId + '</span>';
      html += userLabel;
      html += '</div>';
    });

    // Fill remaining columns
    for (let c = rowSeats.length + 1; c <= maxCols; c++) {
      html += '<div></div>';
    }
  });

  html += '</div>';
  container.innerHTML = html;
  updateStats();
  updateSelectionPanel();
}

function updateStats() {
  let free = 0, pending = 0, confirmed = 0, mine = 0;
  state.seats.forEach(s => {
    const fields = typeof s.fields === 'string' ? JSON.parse(s.fields) : s.fields;
    const status = fields['状态'];
    const selectedById = fields['选中人ID'] || '';
    const isMine = selectedById && state.myUserId && selectedById === state.myUserId;

    if (status === '空闲') free++;
    else if (status === '预选中') { pending++; if (isMine) mine++; }
    else if (status === '已确认') { confirmed++; if (isMine) mine++; }
  });

  document.getElementById('statFree').textContent = free;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('statConfirmed').textContent = confirmed;
  document.getElementById('statMine').textContent = mine;
}

// ============================================================
// Seat Selection
// ============================================================
function toggleSeat(recordId, seatId) {
  const seat = state.seats.find(s => s.id === recordId);
  if (!seat) return;

  const fields = typeof seat.fields === 'string' ? JSON.parse(seat.fields) : seat.fields;
  const status = fields['状态'];

  // Can only select free seats or deselect own pending seats
  if (status !== '空闲' && !state.selectedSeats.has(recordId)) {
    showToast('座位 ' + seatId + ' 已被占用', 'warning');
    return;
  }

  if (state.selectedSeats.has(recordId)) {
    state.selectedSeats.delete(recordId);
  } else {
    state.selectedSeats.add(recordId);
  }

  renderSeats();
}

async function confirmSelection() {
  if (state.selectedSeats.size === 0) {
    showToast('请先选择座位', 'warning');
    return;
  }

  if (!state.user) {
    showToast('请先登录', 'warning');
    return;
  }

  const confirmBtn = document.getElementById('confirmBtn');
  confirmBtn.disabled = true;
  confirmBtn.textContent = '⏳ 提交中...';

  try {
    // Re-check seat statuses before confirming
    const currentSeats = await listSeats();
    if (!currentSeats) {
      confirmBtn.disabled = false;
      confirmBtn.textContent = '✅ 确认选座';
      return;
    }

    const conflicts = [];
    const toUpdate = [];

    state.selectedSeats.forEach(recordId => {
      const current = currentSeats.find(s => s.id === recordId);
      if (!current) return;

      const fields = typeof current.fields === 'string' ? JSON.parse(current.fields) : current.fields;
      if (fields['状态'] !== '空闲') {
        conflicts.push(fields['座位编号']);
        return;
      }

      const now = new Date().toISOString().replace('T', ' ').substring(0, 19);
      toUpdate.push({
        id: recordId,
        fields_value: JSON.stringify({
          '状态': '已确认',
          '选中人': state.user.user_name || state.user.name || '',
          '选中人ID': state.user.ex_user_id || state.user.id || '',
          '选中时间': now
        })
      });
    });

    if (conflicts.length > 0) {
      showToast('座位 ' + conflicts.join(', ') + ' 已被他人占用，请重新选择', 'error');
      state.selectedSeats.clear();
      await refreshSeats();
      confirmBtn.disabled = false;
      confirmBtn.textContent = '✅ 确认选座';
      return;
    }

    if (toUpdate.length === 0) {
      showToast('没有可确认的座位', 'warning');
      confirmBtn.disabled = false;
      confirmBtn.textContent = '✅ 确认选座';
      return;
    }

    const result = await updateSeatRecords(toUpdate);
    if (result) {
      showToast('成功预定 ' + toUpdate.length + ' 个座位！', 'success');
      state.selectedSeats.clear();
      await refreshSeats();
    }
  } catch (e) {
    showToast('提交失败: ' + e.message, 'error');
  }

  confirmBtn.disabled = false;
  confirmBtn.textContent = '✅ 确认选座';
}

function cancelSelection() {
  state.selectedSeats.clear();
  renderSeats();
  showToast('已取消选择', 'warning');
}

function updateSelectionPanel() {
  const panel = document.getElementById('selectionPanel');
  const list = document.getElementById('selectedList');

  if (state.selectedSeats.size === 0) {
    panel.classList.remove('active');
    return;
  }

  panel.classList.add('active');
  let html = '';
  state.selectedSeats.forEach(recordId => {
    const seat = state.seats.find(s => s.id === recordId);
    if (!seat) return;
    const fields = typeof seat.fields === 'string' ? JSON.parse(seat.fields) : seat.fields;
    html += '<span class="selected-tag">' + fields['座位编号'] +
      ' <span class="remove" onclick="toggleSeat(\'' + recordId + '\',\'' + fields['座位编号'] + '\')">×</span></span>';
  });
  list.innerHTML = html;
}

// ============================================================
// Auto-refresh
// ============================================================
async function refreshSeats() {
  const records = await listSeats();
  if (records) {
    state.seats = records;
    renderSeats();
  }
}

function startPolling() {
  stopPolling();
  state.pollingTimer = setInterval(refreshSeats, 15000); // every 15 seconds
}

function stopPolling() {
  if (state.pollingTimer) {
    clearInterval(state.pollingTimer);
    state.pollingTimer = null;
  }
}

// ============================================================
// UI Helpers
// ============================================================
function showToast(msg, type) {
  const toast = document.getElementById('toast');
  const icon = document.getElementById('toastIcon');
  const msgEl = document.getElementById('toastMsg');

  toast.className = 'toast ' + type;
  const icons = { success: '✅', error: '❌', warning: '⚠️' };
  icon.textContent = icons[type] || '✅';
  msgEl.textContent = msg;

  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3500);
}

function resetUI() {
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('userInfo').style.display = 'none';
  document.getElementById('loginBtn').style.display = 'inline-flex';
  document.getElementById('logoutBtn').style.display = 'none';
  state.seats = [];
  state.selectedSeats.clear();
  document.getElementById('seatContainer').innerHTML =
    '<div class="loading"><div class="spinner"></div><div style="color:var(--text-secondary);">请先登录</div></div>';
  document.getElementById('selectionPanel').classList.remove('active');
  stopPolling();
}

function saveConfig() {
  const clientId = document.getElementById('clientIdInput').value.trim();
  const fileId = document.getElementById('fileIdInput').value.trim();

  if (!clientId) {
    showToast('请输入 Client ID', 'warning');
    return;
  }
  if (!fileId) {
    showToast('请输入多维表 File ID', 'warning');
    return;
  }

  state.config.clientId = clientId;
  state.config.fileId = fileId;
  localStorage.setItem('config', JSON.stringify(state.config));
  showToast('配置已保存', 'success');
}

// ============================================================
// Pre-login config (accessible before login)
// ============================================================
function showPreLoginConfig() {
  const overlay = document.getElementById('loginOverlay');
  // Create a config dialog above the login overlay
  const existing = document.getElementById('preLoginConfigDialog');
  if (existing) { existing.remove(); return; }

  const dialog = document.createElement('div');
  dialog.id = 'preLoginConfigDialog';
  dialog.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:2000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.3);';

  let saved = {};
  try { saved = JSON.parse(localStorage.getItem('config') || ''); } catch(e) { saved = {} }

  dialog.innerHTML = `
    <div style="background:white;border-radius:16px;padding:32px;max-width:420px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
      <h3 style="margin-bottom:16px;">⚙️ 配置 Client ID</h3>
      <p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px;">
        在 <a href="https://open.wps.cn" target="_blank" style="color:var(--primary);">WPS 开放平台</a> 创建企业自建应用后，将 App ID 填入下方：
      </p>
      <input type="text" id="preLoginClientId" placeholder="Client ID（App ID）" value="${saved.clientId || ''}"
        style="width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:8px;font-size:14px;margin-bottom:12px;box-sizing:border-box;" />
      <input type="text" id="preLoginFileId" placeholder="多维表 File ID" value="${saved.fileId || 'hZxs1oL261MSdn1L2qqZ1xQXMxTQfGJty'}"
        style="width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:8px;font-size:14px;margin-bottom:16px;box-sizing:border-box;" />
      <div style="display:flex;gap:8px;">
        <button onclick="savePreLoginConfig()" class="btn btn-primary" style="flex:1;">保存配置</button>
        <button onclick="document.getElementById('preLoginConfigDialog').remove()" class="btn btn-outline" style="flex:1;">取消</button>
      </div>
    </div>
  `;
  document.body.appendChild(dialog);
}

function savePreLoginConfig() {
  const clientId = document.getElementById('preLoginClientId').value.trim();
  const fileId = document.getElementById('preLoginFileId').value.trim();
  if (!clientId) { showToast('请�����入 Client ID', 'warning'); return; }
  if (!fileId) { showToast('请输入多维表 File ID', 'warning'); return; }
  state.config.clientId = clientId;
  state.config.fileId = fileId;
  localStorage.setItem('config', JSON.stringify(state.config));
  document.getElementById('preLoginConfigDialog').remove();
  showToast('配置已保存，现在可以登录了', 'success');
}

// ============================================================
// Init
// ============================================================
async function initApp() {
  // Load config
  const savedConfig = localStorage.getItem('config');
  if (savedConfig) {
    try {
      state.config = JSON.parse(savedConfig);
      document.getElementById('clientIdInput').value = state.config.clientId || '';
      document.getElementById('fileIdInput').value = state.config.fileId || 'hZxs1oL261MSdn1L2qqZ1xQXMxTQfGJty';
    } catch (e) {}
  }

  // Check for OAuth callback
  const handled = await handleCallback();
  if (handled) return;

  // Check saved token
  const savedToken = localStorage.getItem('access_token');
  if (savedToken) {
    state.accessToken = savedToken;
  }

  if (!state.accessToken) {
    resetUI();
    return;
  }

  // Get user info
  state.user = await getCurrentUser();
  if (!state.user) {
    resetUI();
    return;
  }

  state.myUserId = state.user.ex_user_id || state.user.id;

  // Update UI
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('userInfo').style.display = 'flex';
  document.getElementById('loginBtn').style.display = 'none';
  document.getElementById('logoutBtn').style.display = 'inline-flex';
  document.getElementById('userName').textContent = state.user.user_name || state.user.name || '用户';
  document.getElementById('userAvatar').textContent = (state.user.user_name || '?')[0];

  // Load seats
  await refreshSeats();
  startPolling();
}

// Start
document.addEventListener('DOMContentLoaded', initApp);
</script>
